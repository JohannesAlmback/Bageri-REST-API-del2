services:
  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
  bageri-api:
    build:
      context: .
      dockerfile: api/dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__postgresdev=Server=postgres;Port=5432;User Id=postgres;Password=postgres;Database=bageri-postgres
    ports:
      - 5002:8080
    depends_on:
      - postgres
volumes:
  pgdata:
